events {}

http {
  server {
    listen 80;

    location / {
      proxy_pass http://moodleapp:80;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
    }

    location /local/prometheus/metrics.php {
      proxy_pass http://moodleapp:80/local/prometheus/metrics.php;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto http;
      proxy_redirect off;
    }
  }
}